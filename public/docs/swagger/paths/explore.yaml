paths:
  /public/explore/jobs:
    get:
      tags: [Explore]
      summary: List lowongan untuk halaman explore
      description: |
        Menampilkan daftar lowongan yang sudah dipublikasikan (published).
        Mendukung pencarian full-text berdasarkan posisi, skill, atau nama mitra,
        serta multi-filter berdasarkan tipe pekerjaan, kebijakan kerja, provinsi,
        level pengalaman, dan rentang waktu update.
        Diurutkan berdasarkan `updated_at` terbaru.
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
            maxLength: 100
          description: Cari berdasarkan posisi, skill, atau nama mitra (case-insensitive, partial match)
          example: accounting
        - in: query
          name: job_types[]
          schema:
            type: array
            items:
              type: string
              enum: [penuh_waktu, kontrak, magang, paruh_waktu, freelance]
          description: |
            Filter tipe pekerjaan (multi-select):
            - penuh_waktu: Penuh Waktu
            - kontrak: Kontrak
            - magang: Magang
            - paruh_waktu: Paruh Waktu
            - freelance: Freelance
        - in: query
          name: work_policies[]
          schema:
            type: array
            items:
              type: string
              enum: [kantor, hybrid, remote]
          description: |
            Filter kebijakan kerja (multi-select):
            - kantor: Kerja di kantor
            - hybrid: Hybrid (kantor + remote)
            - remote: Kerja remote/dari rumah
        - in: query
          name: provinces[]
          schema:
            type: array
            items:
              type: string
          description: Filter provinsi (multi-select, gunakan nama provinsi dari /public/explore/filters)
          example: ["DKI Jakarta"]
        - in: query
          name: experience_levels[]
          schema:
            type: array
            items:
              type: string
              enum: [tidak_berpengalaman, fresh_graduate, kurang_dari_setahun]
          description: |
            Filter level pengalaman (multi-select):
            - tidak_berpengalaman: Tidak Berpengalaman
            - fresh_graduate: Fresh Graduate
            - kurang_dari_setahun: Kurang dari Setahun
        - in: query
          name: updated_within
          schema:
            type: string
            enum: [24h, 7d, 30d, any]
            default: any
          description: |
            Filter rentang waktu update:
            - 24h: 24 jam terakhir
            - 7d: Seminggu terakhir
            - 30d: 1 bulan terakhir
            - any: Kapan pun (default)
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman (dimulai dari 1)
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
          description: Jumlah item per halaman (default 12, maks 50)
      responses:
        "200":
          description: Daftar lowongan berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeExploreJobList"
              example:
                success: true
                message: Daftar lowongan berhasil diambil.
                data:
                  - id: 1
                    slug: accounting-staff-1602be
                    position_name: Accounting Staff
                    job_type: penuh_waktu
                    job_type_label: Penuh Waktu
                    work_policy: kantor
                    work_policy_label: Kerja di kantor
                    created_at_human: 5 jam yang lalu
                    salary_label: Rp 5,7 jt-5,8 jt
                    mitra_name: PT Binajasa Sumber Sarana
                    mitra_type: perusahaan
                    province: DKI Jakarta
                    location: Jakarta Selatan, DKI Jakarta
                    skills: [MYOB, Excel, Akuntansi Dasar]
                    benefits:
                      [BPJS Kesehatan, BPJS Ketenagakerjaan, Makan Siang]
                    mitra_logo_url: https://via.placeholder.com/200x200?text=Binajasa
                errors: null
                meta:
                  pagination:
                    current_page: 1
                    last_page: 1
                    per_page: 12
                    total: 1
                    has_more_pages: false
        "422":
          description: Validasi gagal (parameter query tidak valid)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  per_page:
                    - The per page field must not be greater than 50.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /public/explore/jobs/{slug}:
    get:
      tags: [Explore]
      summary: Detail lowongan explore
      description: |
        Menampilkan detail lengkap sebuah lowongan berdasarkan slug,
        beserta hingga 6 rekomendasi lowongan serupa (berdasarkan provinsi/tipe pekerjaan yang sama).
        Jika rekomendasi dari provinsi/tipe tidak cukup, akan dilengkapi dari lowongan terbaru lainnya.
      security: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Slug unik lowongan
          example: accounting-staff-1602be
      responses:
        "200":
          description: Detail lowongan berhasil diambil
          content:
