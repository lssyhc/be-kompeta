paths:
  /files/me/{type}:
    get:
      tags: [Files]
      summary: Download dokumen private milik user login
      description: |
        Mengunduh dokumen private milik user yang sedang login.
        Dokumen disimpan di storage local (bukan public) sehingga hanya dapat diakses melalui endpoint ini.

        **Tipe dokumen per role:**
        | Role               | Tipe (`type`) yang valid | Dokumen |
        |--------------------|--------------------------|---------|
        | sekolah            | `operational_license`    | Izin Operasional Sekolah |
        | mitra perusahaan   | `kemenkumham_decree`     | SK Kemenkumham |
        | mitra umkm         | `owner_ktp`              | Foto KTP Pemilik |

        Jika `type` tidak sesuai dengan role user, akan dikembalikan 404 (bukan 403).
        Response berupa file stream/download (bukan JSON).
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
            enum: [operational_license, kemenkumham_decree, owner_ktp]
          description: |
            Tipe dokumen yang ingin diunduh:
            - `operational_license`: Izin Operasional (sekolah)
            - `kemenkumham_decree`: SK Kemenkumham (mitra perusahaan)
            - `owner_ktp`: Foto KTP (mitra UMKM)
      responses:
        "200":
          description: File stream/download berhasil
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "404":
          description: Dokumen tidak ditemukan (tipe tidak sesuai role, atau file belum diupload)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Dokumen tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
