paths:
  /docs/openapi:
    get:
      tags: [Docs]
      summary: Ambil file spesifikasi OpenAPI mentah
      description: |
        Mengembalikan file spesifikasi OpenAPI 3.0.3 dalam format YAML mentah.
        Endpoint publik, tidak memerlukan autentikasi.
        Berguna untuk tool Swagger UI atau generator code klien.
      security: []
      responses:
        "200":
          description: File OpenAPI berhasil diambil
          content:
            application/yaml:
              schema:
                type: string
                example: "openapi: 3.0.3"
        "404":
          description: File OpenAPI tidak ditemukan di server
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: OpenAPI spec tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
