paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user sekolah atau mitra
      description: |
        Register publik hanya menerima role `sekolah` atau `mitra`.
        Untuk role `mitra`, wajib mengirim `mitra_type` (`perusahaan` atau `umkm`).

        **Alur setelah registrasi:**
        - Akun sekolah dan mitra dibuat dengan `account_status=pending` dan `is_active=false`.
        - Akun harus menunggu persetujuan admin melalui endpoint `/admin/registrations/{id}/approve`.
        - Setelah admin approve/reject, email notifikasi otomatis dikirim ke email pendaftar.

        **⚠️ Endpoint ini memerlukan `multipart/form-data` karena mengandung file upload.**
        Jika Swagger UI menampilkan text editor (bukan form), gunakan Postman/curl untuk mengirim file.

        **File wajib per role:**
        - **Sekolah:** `logo` (gambar, maks 2 MB), `operational_license` (PDF, maks 5 MB)
        - **Mitra perusahaan:** `company_logo` (gambar, maks 2 MB), `kemenkumham_decree` (PDF, maks 5 MB)
        - **Mitra UMKM:** `umkm_logo` (gambar, maks 2 MB), `owner_ktp_photo` (gambar, maks 2 MB), `image_1`–`image_5` (gambar, masing-masing maks 2 MB)

        **File opsional (semua role kecuali UMKM):**
        - `image_1`–`image_5`: Foto tambahan (gambar, masing-masing maks 2 MB)
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              oneOf:
                - $ref: "../openapi.yaml#/components/schemas/RegisterSekolahRequest"
                - $ref: "../openapi.yaml#/components/schemas/RegisterMitraPerusahaanRequest"
                - $ref: "../openapi.yaml#/components/schemas/RegisterMitraUmkmRequest"
            examples:
              sekolah:
                summary: "Register sekolah (+ upload: logo, operational_license)"
                value:
                  role: sekolah
                  email: smk@example.com
                  password: password123
                  password_confirmation: password123
                  school_name: SMK Negeri 1
                  npsn: "12345678"
                  accreditation: A
                  address: Jl. Pendidikan No. 1
                  expertise_fields:
                    - RPL
                    - TKJ
                  short_description: SMK unggulan berfokus pada teknologi.
                  logo: "(file gambar wajib)"
                  operational_license: "(file PDF wajib)"
              mitra_perusahaan:
                summary: "Register mitra perusahaan (+ upload: company_logo, kemenkumham_decree)"
                value:
                  role: mitra
                  mitra_type: perusahaan
                  email: corp@example.com
                  password: password123
                  password_confirmation: password123
                  company_name: PT Maju Jaya
                  nib: "1234567890123"
                  industry_sector: Teknologi Informasi
                  employee_total_range: 51-200
                  office_address: Jl. Sudirman No. 10
                  short_description: Perusahaan software enterprise.
                  company_logo: "(file gambar wajib)"
                  kemenkumham_decree: "(file PDF wajib)"
              mitra_umkm:
                summary: "Register mitra UMKM (+ upload: umkm_logo, owner_ktp_photo, image_1–5)"
                value:
                  role: mitra
                  mitra_type: umkm
                  email: umkm@example.com
                  password: password123
                  password_confirmation: password123
                  business_name: UMKM Sejahtera
                  owner_nik: "3201234567890001"
                  business_type: Kuliner
                  business_address: Jl. Pasar No. 5
                  short_description: UMKM kuliner lokal.
                  umkm_logo: "(file gambar wajib)"
                  owner_ktp_photo: "(file gambar wajib)"
                  image_1: "(file gambar wajib)"
                  image_2: "(file gambar wajib)"
                  image_3: "(file gambar wajib)"
                  image_4: "(file gambar wajib)"
                  image_5: "(file gambar wajib)"
      responses:
        "201":
          description: Registrasi berhasil. Akun dibuat dengan status `pending`.
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeAuthRegister"
              example:
                success: true
                message: Registrasi berhasil. Mohon menunggu persetujuan dari Tim Kompeta untuk pengaktifan akun, informasi selanjutnya akan dikirimkan melalui email yang Anda daftarkan.
                data:
                  user:
                    id: 10
                    name: SMK Negeri 1
                    email: smk@example.com
                    role: sekolah
                    mitra_type: null
                    account_status: pending
                    is_active: false
                    last_login_at: null
                  role_profile:
                    school_name: SMK Negeri 1
                    npsn: "12345678"
                errors: null
                meta: null
        "422":
          description: Validasi gagal (field wajib kosong, email duplikat, format salah, dll.)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  email:
                    - The email has already been taken.
                  password:
                    - The password field must be at least 8 characters.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login berdasarkan role
      description: |
        Endpoint login universal untuk semua role.

        **Mekanisme login per role:**
        - **Siswa** (`role=siswa`): gunakan `nisn`, `school_origin`, `unique_code`
        - **Non-siswa** (`role=admin|sekolah|mitra`): gunakan `email`, `password`

        **Response khusus siswa:**
        - `requires_skill_setup`: `true` jika siswa belum menambahkan skill (onboarding).
        - `next_step`: `add_skill` jika skill belum diisi, `null` jika sudah lengkap.

        **Akun seeded siap pakai:**
        - admin: `admin@kompeta.test` / `admin12345`
        - sekolah: `school.a@kompeta.test` / `password123`
        - mitra perusahaan: `mitra.company.a@kompeta.test` / `password123`
        - mitra umkm: `mitra.umkm.a@kompeta.test` / `password123`
        - siswa: `nisn=0002345678`, `school_origin=SMA Negeri 2 Jakarta`, `unique_code=qzPSGd04erQblY8G`
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "../openapi.yaml#/components/schemas/LoginNonSiswaRequest"
                - $ref: "../openapi.yaml#/components/schemas/LoginSiswaRequest"
            examples:
              non_siswa:
                summary: Login sekolah/admin/mitra
                value:
                  role: sekolah
                  email: school.a@kompeta.test
                  password: password123
              siswa:
                summary: Login siswa
                value:
                  role: siswa
                  nisn: "0002345678"
                  school_origin: SMA Negeri 2 Jakarta
                  unique_code: qzPSGd04erQblY8G
      responses:
        "200":
          description: Login berhasil. Token Sanctum dikembalikan.
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeAuthLogin"
              example:
                success: true
                message: Login berhasil.
                data:
                  token: 1|abcdef1234567890abcdef1234567890abcdef12345678
                  token_type: Bearer
                  user:
                    id: 13
                    name: Ahmad Wijaya
                    email: null
                    role: siswa
                    mitra_type: null
                    account_status: active
                    is_active: true
                    last_login_at: "2026-03-23T10:30:00.000000Z"
                  role_profile:
                    full_name: Ahmad Wijaya
                    nisn: "0002345678"
                    school_origin: SMA Negeri 2 Jakarta
                  requires_skill_setup: false
                  next_step: null
                errors: null
                meta: null
        "403":
          description: Akun belum disetujui atau ditolak
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              examples:
                pending:
                  summary: Akun masih pending (menunggu approval admin)
                  value:
                    success: false
                    message: "Akun belum disetujui. Mohon menunggu persetujuan dari Tim Kompeta untuk pengaktifan akun. Pemberitahuan pengaktifan akan dikirimkan melalui email Anda nanti."
                    data: null
                    errors: null
                    meta: null
                rejected:
                  summary: Akun ditolak admin
                  value:
                    success: false
                    message: "Akun tidak disetujui. Silakan periksa email yang Anda daftarkan untuk membaca informasi penolakan lebih lanjut dari Tim Kompeta."
                    data: null
                    errors: null
                    meta: null
        "422":
          description: Kredensial tidak valid atau validasi gagal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope"
              example:
                success: false
                message: Kredensial login tidak valid.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout token aktif
      description: |
        Menghapus token Sanctum yang sedang digunakan (current access token).
        Setelah logout, token tersebut tidak bisa digunakan lagi.
      responses:
        "200":
          description: Logout berhasil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeEmpty"
              example:
                success: true
                message: Logout berhasil.
                data: null
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /auth/me:
    get:
      tags: [Auth]
      summary: Ambil profil user login
      description: |
        Mengembalikan data user yang sedang login beserta `role_profile` spesifik role.
        Untuk siswa, menyertakan field onboarding (`requires_skill_setup`, `next_step`).

        **Perbedaan dengan `/profile`:**
        - `/auth/me` menyertakan `requires_skill_setup` dan `next_step` (onboarding state).
        - `/profile` mengembalikan detail profil yang lebih lengkap (termasuk `job_applications` untuk siswa).
      responses:
        "200":
          description: Data user berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeAuthMe"
              example:
                success: true
                message: Data user berhasil diambil.
                data:
                  user:
                    id: 13
                    name: Ahmad Wijaya
                    email: null
                    role: siswa
                    mitra_type: null
                    account_status: active
                    is_active: true
                    last_login_at: "2026-03-23T10:30:00.000000Z"
                  role_profile:
                    full_name: Ahmad Wijaya
                    nisn: "0002345678"
                    school_origin: SMA Negeri 2 Jakarta
                  requires_skill_setup: false
                  next_step: null
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
