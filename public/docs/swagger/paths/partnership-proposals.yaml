paths:
  /partnership-proposals:
    get:
      tags: [Partnership Proposals]
      summary: Daftar pengajuan kemitraan
      description: |
        Menampilkan daftar pengajuan kemitraan secara paginated.
        Mendukung dua scope:
        - `sent` (default): Pengajuan yang dibuat oleh user login (`proposer_user_id`)
        - `received`: Pengajuan yang ditujukan kepada user login (`target_user_id`)

        Diurutkan berdasarkan `submitted_at` terbaru, lalu `created_at` terbaru.
      parameters:
        - in: query
          name: scope
          schema:
            type: string
            enum: [sent, received]
            default: sent
          description: |
            Filter berdasarkan arah pengajuan:
            - `sent`: pengajuan yang dikirim oleh user login
            - `received`: pengajuan yang diterima/ditujukan ke user login
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman (dimulai dari 1)
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
          description: Jumlah item per halaman (default 12, maks 50)
      responses:
        "200":
          description: Daftar pengajuan kemitraan berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopePartnershipProposalList"
              example:
                success: true
                message: Daftar pengajuan kemitraan berhasil diambil.
                data:
                  - id: 2
                    proposer_user_id: 4
                    target_user_id: 8
                    school_user_id: 8
                    mitra_user_id: 4
                    nama_mitra: Roti Bunda Rasa
                    mitra_tipe: umkm
                    sektor_atau_tipe: Kuliner
                    notes: Kolaborasi kewirausahaan untuk program kelas industri UMKM.
                    status_submit: submitted
                    tanggal_submit: "2026-03-20T10:00:00+07:00"
                    created_at: "2026-03-23T10:00:00+07:00"
                    updated_at: "2026-03-23T10:00:00+07:00"
                errors: null
                meta:
                  pagination:
                    current_page: 1
                    last_page: 1
                    per_page: 12
                    total: 1
                    has_more_pages: false
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

    post:
      tags: [Partnership Proposals]
      summary: Kirim pengajuan kemitraan
      description: |
        Membuat dan langsung mengirim pengajuan kemitraan baru.
        Hanya user dengan role `sekolah` atau `mitra` yang dapat membuat pengajuan.

        **Aturan bisnis:**
        - Sekolah hanya bisa mengajukan ke mitra, mitra hanya bisa mengajukan ke sekolah.
        - Tidak bisa mengajukan ke diri sendiri.
        - Tidak boleh ada pengajuan `submitted` aktif untuk pasangan proposer→target yang sama (duplikat ditolak 422).

        **File yang wajib diunggah:**
        - `proposal_pdf`: File proposal (PDF, maks 5 MB)
        - `signature_file`: File tanda tangan (PDF, maks 5 MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "../openapi.yaml#/components/schemas/StorePartnershipProposalRequest"
      responses:
        "201":
          description: Pengajuan kemitraan berhasil dikirim
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopePartnershipProposal"
              example:
                success: true
                message: Pengajuan kemitraan berhasil dikirim.
                data:
                  id: 2
                  proposer_user_id: 4
                  target_user_id: 8
                  school_user_id: 8
                  mitra_user_id: 4
                  nama_mitra: Roti Bunda Rasa
                  mitra_tipe: umkm
                  sektor_atau_tipe: Kuliner
                  notes: Kolaborasi kewirausahaan untuk program kelas industri UMKM.
                  status_submit: submitted
                  tanggal_submit: "2026-03-23T12:00:00+07:00"
                  created_at: "2026-03-23T10:00:00+07:00"
                  updated_at: "2026-03-23T12:00:00+07:00"
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah atau mitra
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya sekolah atau mitra yang dapat membuat pengajuan kemitraan.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal, target tidak valid, atau duplikat pengajuan aktif
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              examples:
                validasi_gagal:
                  summary: Field wajib kosong
                  value:
                    success: false
                    message: Validasi gagal.
                    data: null
                    errors:
                      target_user_id:
                        - The target user id field is required.
                      proposal_pdf:
                        - The proposal pdf field is required.
                    meta: null
                duplikat:
                  summary: Pengajuan aktif sudah ada
                  value:
                    success: false
                    message: Anda sudah memiliki pengajuan aktif ke pihak ini.
                    data: null
                    errors: null
                    meta: null
                role_mismatch:
                  summary: Target role tidak sesuai (sekolah ke sekolah, dll.)
                  value:
                    success: false
                    message: Sekolah hanya dapat mengajukan ke mitra, dan sebaliknya.
                    data: null
                    errors: null
                    meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /partnership-proposals/{id}:
    get:
      tags: [Partnership Proposals]
      summary: Detail pengajuan kemitraan
      description: |
        Menampilkan detail satu pengajuan kemitraan.
        User harus merupakan pihak yang terlibat (proposer atau target).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID pengajuan kemitraan
          example: 1
      responses:
        "200":
          description: Detail pengajuan kemitraan berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopePartnershipProposal"
              example:
                success: true
                message: Detail pengajuan kemitraan berhasil diambil.
                data:
                  id: 1
                  proposer_user_id: 9
                  target_user_id: 2
                  school_user_id: 9
                  mitra_user_id: 2
                  nama_mitra: PT Binajasa Sumber Sarana
                  mitra_tipe: perusahaan
                  sektor_atau_tipe: Outsourcing dan layanan tenaga kerja
                  notes: Pengajuan kerja sama magang siswa kelas XII untuk periode Juli-Desember.
                  status_submit: submitted
                  tanggal_submit: "2026-03-14T12:00:00+07:00"
                  proposal_pdf_url: http://localhost:8000/api/partnership-proposals/1/proposal-pdf
                  signature_url: http://localhost:8000/api/partnership-proposals/1/signature
                  created_at: "2026-03-14T10:00:00+07:00"
                  updated_at: "2026-03-14T12:00:00+07:00"
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "404":
          description: Pengajuan tidak ditemukan atau user bukan pihak terkait
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Pengajuan kemitraan tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /partnership-proposals/{id}/proposal-pdf:
    get:
      tags: [Partnership Proposals]
      summary: Download file proposal PDF
      description: |
        Mengunduh file proposal PDF dari pengajuan kemitraan.
        User harus merupakan pihak yang terlibat (proposer atau target).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID pengajuan kemitraan
          example: 1
      responses:
        "200":
          description: File proposal PDF berhasil diunduh
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "404":
          description: Pengajuan atau dokumen tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Dokumen proposal tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /partnership-proposals/{id}/signature:
    get:
      tags: [Partnership Proposals]
      summary: Download file tanda tangan
      description: |
        Mengunduh file tanda tangan dari pengajuan kemitraan.
        User harus merupakan pihak yang terlibat (proposer atau target).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID pengajuan kemitraan
          example: 1
      responses:
        "200":
          description: File tanda tangan berhasil diunduh
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "404":
          description: Pengajuan atau dokumen tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Dokumen tanda tangan tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
