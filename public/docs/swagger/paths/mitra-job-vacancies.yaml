    put:
      tags: [Mitra Job Vacancies]
      summary: Update lowongan milik mitra
      description: |
        Memperbarui lowongan kerja milik mitra yang sedang login.
        Semua field bersifat opsional (partial update). Jika skills/benefits dikirim, akan menggantikan data lama.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID lowongan
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                position_name:
                  type: string
                  maxLength: 255
                  example: Senior Accounting Staff
                category:
                  type: string
                  maxLength: 255
                  example: Keuangan
                job_type:
                  type: string
                  enum: [penuh_waktu, kontrak, magang, paruh_waktu, freelance]
                  example: penuh_waktu
                work_policy:
                  type: string
                  enum: [kantor, hybrid, remote]
                  example: hybrid
                experience_level:
                  type: string
                  enum:
                    [tidak_berpengalaman, fresh_graduate, kurang_dari_setahun]
                  example: kurang_dari_setahun
                province:
                  type: string
                  example: DKI Jakarta
                salary_min:
                  type: integer
                  nullable: true
                  minimum: 0
                  example: 6000000
                salary_max:
                  type: integer
                  nullable: true
                  minimum: 0
                  description: Harus >= salary_min jika keduanya diisi
                  example: 7000000
                is_salary_hidden:
                  type: boolean
                  example: false
                requirements:
                  type: string
                  nullable: true
                  maxLength: 5000
                  example: "Minimal Sarjana (S1).\nMemahami MYOB & SAP."
                job_description:
                  type: string
                  maxLength: 10000
                  example: Mengerjakan proses jurnal, rekonsiliasi, dan laporan keuangan harian perusahaan.
                is_published:
                  type: boolean
                  example: true
                skills:
                  type: array
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 100
                  example: [MYOB, SAP, Excel, Akuntansi Dasar]
                benefits:
                  type: array
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 100
                  example:
                    [BPJS Kesehatan, BPJS Ketenagakerjaan, Makan Siang, THR]
      responses:
        "200":
          description: Lowongan berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeMitraJobVacancy"
              example:
                success: true
                message: Lowongan berhasil diperbarui.
                data:
                  id: 1
                  slug: accounting-staff-1602be
                  position_name: Senior Accounting Staff
                  category: Keuangan
                  job_type: penuh_waktu
                  job_type_label: Penuh Waktu
                  work_policy: hybrid
                  work_policy_label: Kerja di kantor / rumah
                  experience_level: kurang_dari_setahun
                  experience_level_label: Kurang dari setahun
                  province: DKI Jakarta
                  salary_min: 6000000
                  salary_max: 7000000
                  is_salary_hidden: false
                  salary_label: Rp 6 jt-7 jt
                  requirements: "Minimal Sarjana (S1).\nMemahami MYOB & SAP."
                  job_description: Mengerjakan proses jurnal, rekonsiliasi, dan laporan keuangan harian perusahaan.
                  is_published: true
                  skills: [MYOB, SAP, Excel, Akuntansi Dasar]
                  benefits:
                    [BPJS Kesehatan, BPJS Ketenagakerjaan, Makan Siang, THR]
                  created_at: "2026-03-23T05:00:00+07:00"
                  updated_at: "2026-03-26T10:30:00+07:00"
                errors: null
                meta: null
        "401":
          description: Belum login / token tidak valid
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
        "403":
          description: Bukan role mitra
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya mitra yang dapat mengubah lowongan.
                data: null
                errors: null
                meta: null
        "404":
          description: Lowongan tidak ditemukan atau bukan milik mitra
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Lowongan tidak ditemukan.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  job_type:
                    - The selected job type is invalid.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
    delete:
      tags: [Mitra Job Vacancies]
      summary: Hapus lowongan milik mitra
      description: |
        Menghapus lowongan kerja milik mitra yang sedang login.
        Penghapusan bersifat cascade — skills, benefits, dan bookmarks terkait ikut terhapus.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID lowongan
          example: 1
      responses:
        "200":
          description: Lowongan berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeEmpty"
              example:
                success: true
                message: Lowongan berhasil dihapus.
                data: null
                errors: null
                meta: null
        "401":
          description: Belum login / token tidak valid
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
        "403":
          description: Bukan role mitra
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya mitra yang dapat menghapus lowongan.
                data: null
                errors: null
                meta: null
        "404":
          description: Lowongan tidak ditemukan atau bukan milik mitra
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Lowongan tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
