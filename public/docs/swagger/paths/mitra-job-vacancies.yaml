          description: ID lowongan
          example: 1
      responses:
        "200":
          description: Detail lowongan berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeMitraJobVacancy"
              example:
                success: true
                message: Detail lowongan berhasil diambil.
                data:
                  id: 1
                  slug: accounting-staff-1602be
                  position_name: Accounting Staff
                  category: Keuangan
                  job_type: penuh_waktu
