paths:
  /profile:
    get:
      tags: [Profile]
      summary: Ambil profile user login lintas role
      description: |
        Endpoint profile universal untuk semua role.
        Field `role_profile` diisi dari tabel profile sesuai role user:
        - **admin** → `admin_profiles` (`full_name`, `avatar_path`, `avatar_url`)
        - **sekolah** → `school_profiles` (`school_name`, `npsn`, `address`, `accreditation`, `expertise_fields`, `short_description`, dll.)
        - **mitra perusahaan** → `company_profiles` (`company_name`, `nib`, `industry_sector`, `employee_total_range`, `office_address`, `short_description`, dll.)
        - **mitra umkm** → `umkm_profiles` (`business_name`, `owner_nik`, `business_type`, `business_address`, `short_description`, dll.)
        - **siswa** → `student_profiles` + `job_applications` (`full_name`, `nisn`, `major`, `school_origin`, `graduation_status`, `class_year`, `description`, `phone_number`, `address`, dll.)

        Untuk siswa, `role_profile` juga menyertakan `job_applications` — daftar lamaran kerja aktif.
      responses:
        "200":
          description: Profil berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeProfile"
              examples:
                admin:
                  summary: Response profile admin
                  value:
                    success: true
                    message: Profil berhasil diambil.
                    data:
                      user:
                        id: 1
                        name: System Admin
                        email: admin@kompeta.test
                        role: admin
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T10:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 1
                        full_name: System Admin
                        avatar_path: null
                        avatar_url: null
                    errors: null
                    meta: null
                siswa:
                  summary: Response profile siswa (termasuk job_applications)
                  value:
                    success: true
                    message: Profil berhasil diambil.
                    data:
                      user:
                        id: 11
                        name: Budi Santoso
                        email: student.a1@kompeta.test
                        role: siswa
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T09:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 11
                        full_name: Budi Santoso
                        nisn: "0001234567"
                        major: IPA
                        school_origin: SMA Negeri 1 Bogor
                        graduation_status: graduated
                        class_year: "2024"
                        description: Siswa berprestasi dengan fokus bidang sains dan data.
                        phone_number: "082123456789"
                        address: Bogor, Jawa Barat
                        job_applications:
                          - company_name: PT Binajasa Sumber Sarana
                            role_type: Accounting Staff
                            applied_at: "2026-03-19T09:00:00+07:00"
                            status: submitted
                    errors: null
                    meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

    put:
      tags: [Profile]
      summary: Update profile user login lintas role
      description: |
        Update profile universal untuk semua role.
        Payload menggunakan dua object:
        - `user` (opsional): data umum user (contoh: `name`)
        - `profile` (opsional): data profile spesifik role

        **Field `profile` per role:**
        | Role                | Field yang diterima |
        |---------------------|---------------------|
        | admin               | `full_name` |
        | sekolah             | `short_description`, `address`, `accreditation`, `expertise_fields` |
        | mitra perusahaan    | `short_description`, `office_address`, `website_or_social_url`, `industry_sector`, `employee_total_range` |
        | mitra umkm          | `short_description`, `business_address`, `business_type`, `owner_personal_nib` |
        | siswa               | `description`, `phone_number`, `address`, `class_year` |

        **Kompatibilitas siswa (legacy format):**
        Selain format nested `profile.{field}`, siswa juga bisa mengirim field di level root:
        ```json
        {
          "description": "...",
          "phone_number": "...",
          "address": "...",
          "class_year": "2026"
        }
        ```
        Kedua format valid dan menghasilkan response yang sama.

        **Response sukses:**
        Response identik dengan `GET /profile` — mengembalikan `user` dan `role_profile` yang sudah diperbarui.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  description: Data umum user yang ingin diperbarui
                  properties:
                    name:
                      type: string
                      maxLength: 255
                      description: Nama tampilan user
                profile:
                  type: object
                  description: Data profile spesifik role (lihat tabel di atas)
                  additionalProperties: true
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                  description: "[Siswa legacy format] Deskripsi diri siswa"
                phone_number:
                  type: string
                  nullable: true
                  maxLength: 30
                  description: "[Siswa legacy format] Nomor telepon siswa"
                address:
                  type: string
                  nullable: true
                  description: "[Siswa legacy format] Alamat siswa"
                class_year:
                  type: string
                  nullable: true
                  minLength: 4
                  maxLength: 4
                  description: "[Siswa legacy format] Tahun kelas siswa (4 digit, contoh: 2026)"
            examples:
              admin:
                summary: Update profile admin
                value:
                  user:
                    name: Admin Kompeta
                  profile:
                    full_name: Admin Kompeta
              sekolah:
                summary: Update profile sekolah
                value:
                  user:
                    name: SMK Negeri 1
                  profile:
                    short_description: Sekolah vokasi unggulan.
                    address: Jl. Pendidikan No. 1
                    accreditation: A
                    expertise_fields:
                      - RPL
                      - TKJ
              mitra_perusahaan:
                summary: Update profile mitra perusahaan
                value:
                  profile:
                    short_description: Perusahaan software enterprise.
                    office_address: Jl. Sudirman No. 10
                    website_or_social_url: https://example.com
                    industry_sector: Teknologi Informasi
                    employee_total_range: 51-200
              mitra_umkm:
                summary: Update profile mitra UMKM
                value:
                  profile:
                    short_description: UMKM kuliner lokal yang berkembang.
                    business_address: Jl. Pasar No. 5
                    business_type: Kuliner
                    owner_personal_nib: "9876543210"
              siswa:
                summary: Update profile siswa (legacy format)
                value:
                  description: Siswa RPL fokus backend Laravel.
                  phone_number: "081234567890"
                  address: Jakarta Selatan
                  class_year: "2026"
              siswa_nested:
                summary: Update profile siswa (nested format)
                value:
                  profile:
                    description: Siswa RPL fokus backend Laravel.
                    phone_number: "081234567890"
                    address: Jakarta Selatan
                    class_year: "2026"
      responses:
        "200":
          description: Profil berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeProfile"
              examples:
                admin:
                  summary: Response update profile admin
                  value:
                    success: true
                    message: Profil berhasil diperbarui.
                    data:
                      user:
                        id: 1
                        name: Admin Kompeta
                        email: admin@kompeta.test
                        role: admin
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T10:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 1
                        full_name: Admin Kompeta
                        avatar_path: null
                        avatar_url: null
                    errors: null
                    meta: null
                siswa:
                  summary: Response update profile siswa
                  value:
                    success: true
                    message: Profil berhasil diperbarui.
                    data:
                      user:
                        id: 11
                        name: Budi Santoso
                        email: student.a1@kompeta.test
                        role: siswa
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T09:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 11
                        full_name: Budi Santoso
                        nisn: "0001234567"
                        major: IPA
                        school_origin: SMA Negeri 1 Bogor
                        graduation_status: graduated
                        class_year: "2024"
                        description: Siswa berprestasi dengan fokus bidang sains dan data.
                        phone_number: "082123456789"
                        address: Bogor, Jawa Barat
                        job_applications:
                          - company_name: PT Binajasa Sumber Sarana
                            role_type: Accounting Staff
                            applied_at: "2026-03-19T09:00:00+07:00"
                            status: submitted
                    errors: null
                    meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  profile.full_name:
                    - The profile.full name field must be a string.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
