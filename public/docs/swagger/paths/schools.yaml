paths:
  /public/schools:
    get:
      tags: [Schools]
      summary: List sekolah
      description: |
        Menampilkan daftar sekolah dengan informasi dasar (nama, lokasi, logo, jurusan).
        Hanya akun sekolah yang sudah disetujui admin (`account_status=active`) yang ditampilkan.
        Mendukung pencarian berdasarkan nama sekolah (case-insensitive, partial match).
        Diurutkan berdasarkan `created_at` terbaru.
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama sekolah (case-insensitive, partial match)
          example: SMA Negeri 1
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman (dimulai dari 1)
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
          description: Jumlah item per halaman (default 12, maks 50)
      responses:
        "200":
          description: Daftar sekolah berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeSchoolList"
              example:
                success: true
                message: Daftar sekolah berhasil diambil.
                data:
                  - id: 8
                    school_name: SMA Negeri 1 Bogor
                    address: Jl. Ahmad Yani No. 1, Bogor, Jawa Barat
                    logo_url: https://via.placeholder.com/200x200?text=SMA+Negeri+1
                    expertise_fields: [IPA, IPS, Bahasa]
                  - id: 9
                    school_name: SMA Negeri 2 Jakarta
                    address: Jl. Sudirman No. 100, Jakarta Pusat, DKI Jakarta
                    logo_url: https://via.placeholder.com/200x200?text=SMA+Negeri+2
                    expertise_fields: [IPA, IPS]
                errors: null
                meta:
                  pagination:
                    current_page: 1
                    last_page: 1
                    per_page: 12
                    total: 2
                    has_more_pages: false
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /public/schools/{id}:
    get:
      tags: [Schools]
      summary: Detail sekolah
      description: |
        Menampilkan detail lengkap sebuah sekolah beserta:
        - Profil sekolah (nama, lokasi, logo, galeri, deskripsi, akreditasi)
        - Daftar jurusan (expertise_fields)
        - Prestasi siswa sekolah (dari tabel student_achievements)
        - Daftar siswa dari sekolah tersebut
        - Pengajuan kemitraan yang sudah disubmit (status submitted)

        Hanya dapat diakses untuk akun sekolah yang sudah disetujui admin (`account_status=active`).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID user sekolah
          example: 8
      responses:
        "200":
          description: Detail sekolah berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeSchoolDetail"
              example:
                success: true
                message: Detail sekolah berhasil diambil.
                data:
                  id: 8
                  school_name: SMA Negeri 1 Bogor
                  address: Jl. Ahmad Yani No. 1, Bogor, Jawa Barat
                  logo_url: https://via.placeholder.com/200x200?text=SMA+Negeri+1
                  gallery:
                    - https://via.placeholder.com/400x300?text=SMA+Bogor+1
                    - https://via.placeholder.com/400x300?text=SMA+Bogor+2
                    - https://via.placeholder.com/400x300?text=SMA+Bogor+3
                    - https://via.placeholder.com/400x300?text=SMA+Bogor+4
                    - https://via.placeholder.com/400x300?text=SMA+Bogor+5
                  short_description: SMA Negeri 1 Bogor berfokus pada pengembangan akademik, karakter, dan kesiapan karier siswa.
                  accreditation: A
                  expertise_fields: [IPA, IPS, Bahasa]
                  student_achievements:
                    - title: Juara 1 Olimpiade Matematika
                      description: Pencapaian pada OSN Tingkat Nasional 2025
                    - title: Juara 2 Debat Bahasa Inggris
                      description: Kompetisi Nasional Bahasa Inggris 2025
                  students:
                    - id: 1
                      full_name: Budi Santoso
                      major: IPA
                      graduation_status: graduated
                      photo_profile_url: https://via.placeholder.com/200x200?text=Budi
                    - id: 2
                      full_name: Siti Rahayu
                      major: IPA
                      graduation_status: active
                      photo_profile_url: https://via.placeholder.com/200x200?text=Siti
                  pengajuan_mitra: []
                errors: null
                meta: null
        "404":
          description: Sekolah tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Sekolah tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
