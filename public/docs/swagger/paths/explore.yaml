  /public/explore/filters:
    get:
      tags: [Explore]
      summary: Opsi filter halaman explore
      description: |
        Mengembalikan semua opsi filter yang tersedia untuk halaman explore.
        Digunakan frontend untuk merender dropdown/checkbox filter.
        Setiap item filter memiliki `value` (untuk dikirim sebagai query param) dan `label` (untuk ditampilkan di UI).
      security: []
      responses:
        "200":
          description: Opsi filter explore berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeExploreFilters"
              example:
                success: true
                message: Opsi filter explore berhasil diambil.
                data:
                  job_types:
                    - value: penuh_waktu
                      label: Penuh Waktu
                    - value: kontrak
                      label: Kontrak
                    - value: magang
                      label: Magang
                    - value: paruh_waktu
                      label: Paruh Waktu
                    - value: freelance
                      label: Freelance
                  work_policies:
                    - value: kantor
                      label: Kerja di kantor
                    - value: hybrid
                      label: Hybrid
                    - value: remote
                      label: Kerja remote/dari rumah
                  provinces:
                    - DKI Jakarta
                    - Jawa Barat
                    - Jawa Tengah
                    - DI Yogyakarta
                  experience_levels:
                    - value: tidak_berpengalaman
                      label: Tidak Berpengalaman
                    - value: fresh_graduate
                      label: Fresh Graduate
                    - value: kurang_dari_setahun
                      label: Kurang dari Setahun
                  updated_within:
                    - value: 7d
                      label: Seminggu terakhir
                    - value: 24h
                      label: 24 jam terakhir
                    - value: 30d
                      label: 1 bulan terakhir
                    - value: any
                      label: Kapan pun
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
