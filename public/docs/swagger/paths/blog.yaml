paths:
  /admin/blog/articles:
    post:
      tags: [Blog]
      summary: Buat artikel blog (admin only)
      description: |
        Membuat artikel blog baru. Hanya user dengan role `admin` yang dapat mengakses.

        **Field wajib:**
        - `content_type_id`: ID tipe konten (harus merujuk ke tipe yang aktif)
        - `title`: Judul artikel
        - `thumbnail`: Gambar thumbnail (file upload, format gambar)
        - `body`: Isi konten artikel

        **Field opsional:**
        - `is_published`: Apakah langsung dipublikasi (default: `true`)
        - `published_at`: Tanggal publikasi kustom (default: saat ini jika `is_published=true`)

        Slug artikel di-generate otomatis dari `title`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [content_type_id, title, thumbnail, body]
              properties:
                content_type_id:
                  type: integer
                  description: ID tipe konten blog (harus aktif)
                  example: 1
                title:
                  type: string
                  maxLength: 255
                  description: Judul artikel
                  example: Artikel Perdana Kompeta
                thumbnail:
                  type: string
                  format: binary
                  description: Gambar thumbnail artikel (file upload)
                body:
                  type: string
                  description: Isi konten artikel (HTML atau teks)
                  example: Isi konten artikel lengkap.
                is_published:
                  type: boolean
                  default: true
                  description: Apakah artikel langsung dipublikasi
                published_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Tanggal publikasi kustom (ISO 8601)
      responses:
        "201":
          description: Artikel berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeArticleDetail"
              example:
                success: true
                message: Artikel berhasil dibuat.
                data:
                  id: 1
                  content_type:
                    id: 1
                    name: News
                    slug: news
                  title: Artikel Perdana Kompeta
                  slug: artikel-perdana-kompeta
                  body: Isi konten artikel lengkap.
                  view_count: 0
                  thumbnail_url: http://localhost:8000/storage/blog/thumbnails/sample.jpg
                  is_published: true
                  published_at: "2026-03-22T02:08:14Z"
                  created_by: 1
                  created_by_name: System Admin
                  created_at: "2026-03-22T02:08:14Z"
                  updated_at: "2026-03-22T02:08:14Z"
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role admin
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya admin yang dapat membuat artikel.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal (field wajib kosong, format salah, dll.)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  title:
                    - The title field is required.
                  thumbnail:
                    - The thumbnail field is required.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /public/blog/content-types:
    get:
      tags: [Blog]
      summary: Daftar tipe konten blog aktif
      description: |
        Mengembalikan semua tipe konten blog yang berstatus aktif (`is_active=true`).
        Endpoint publik, tidak memerlukan autentikasi.
      security: []
      responses:
        "200":
          description: Daftar tipe konten berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeContentTypeList"
              example:
                success: true
                message: Daftar tipe konten berhasil diambil.
                data:
                  - id: 1
                    name: News
                    slug: news
                  - id: 2
                    name: Tips
                    slug: tips
                  - id: 3
                    name: Career Insight
                    slug: career-insight
                  - id: 4
                    name: Success Story
                    slug: success-story
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /public/blog/articles:
    get:
      tags: [Blog]
      summary: Daftar artikel blog (dengan search dan filter)
      description: |
        Menampilkan daftar artikel blog yang sudah dipublikasi secara paginated.
        Mendukung pencarian di title/body dan filter berdasarkan tipe konten.

        **Sorting:**
        - `latest` (default): Berdasarkan `published_at` terbaru
        - `most_read`: Berdasarkan `view_count` tertinggi
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
            maxLength: 100
          description: Kata kunci pencarian di title/body (case-insensitive, partial match)
          example: kompeta
        - in: query
          name: content_type_id
          schema:
            type: integer
          description: Filter berdasarkan ID tipe konten
          example: 1
        - in: query
          name: content_type_slug
          schema:
            type: string
          description: Filter berdasarkan slug tipe konten
          example: news
        - in: query
          name: sort
          schema:
            type: string
            enum: [latest, most_read]
            default: latest
          description: |
            Urutan hasil:
            - `latest`: Terbaru berdasarkan `published_at`
            - `most_read`: Paling banyak dibaca berdasarkan `view_count`
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman (dimulai dari 1)
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
          description: Jumlah item per halaman (default 12, maks 50)
      responses:
        "200":
          description: Daftar artikel berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeArticleList"
              example:
                success: true
                message: Daftar artikel berhasil diambil.
                data:
                  - id: 1
                    content_type:
                      id: 1
                      name: News
                      slug: news
                    title: Artikel Perdana Kompeta
                    slug: artikel-perdana-kompeta
                    view_count: 120
                    thumbnail_url: http://localhost:8000/storage/blog/thumbnails/sample.jpg
                    published_at: "2026-03-22T02:08:14Z"
                    created_at: "2026-03-22T02:08:14Z"
                errors: null
                meta:
                  pagination:
                    current_page: 1
                    last_page: 1
                    per_page: 12
                    total: 1
                    has_more_pages: false
        "422":
          description: Validasi query gagal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  sort:
                    - The selected sort is invalid.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /public/blog/articles/most-read:
    get:
      tags: [Blog]
      summary: Daftar artikel paling banyak dibaca
      description: |
        Mengembalikan daftar artikel yang paling banyak dibaca (berdasarkan `view_count`).
        Tanpa paginasi — langsung mengembalikan array dengan jumlah sesuai `limit`.
      security: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 6
          description: Jumlah artikel yang dikembalikan (default 6, maks 20)
      responses:
        "200":
          description: Daftar artikel paling banyak dibaca berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeArticleListNoPagination"
              example:
                success: true
                message: Daftar artikel paling banyak dibaca berhasil diambil.
                data:
                  - id: 1
                    content_type:
                      id: 1
                      name: News
                      slug: news
                    title: Artikel Perdana Kompeta
                    slug: artikel-perdana-kompeta
                    view_count: 120
                    thumbnail_url: http://localhost:8000/storage/blog/thumbnails/sample.jpg
                    published_at: "2026-03-22T02:08:14Z"
                    created_at: "2026-03-22T02:08:14Z"
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /admin/blog/articles/{slug}:
    put:
      tags: [Blog]
      summary: Update artikel blog (admin only)
      description: |
        Mengubah artikel blog berdasarkan slug. Hanya user dengan role `admin` yang dapat mengakses.

        Semua field bersifat opsional (partial update).
        Jika `title` diubah, `slug` otomatis di-regenerate.
        Jika `is_published` diubah ke `true` dan belum ada `published_at`, otomatis diisi saat ini.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Slug unik artikel
          example: artikel-perdana-kompeta
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                content_type_id:
                  type: integer
                  description: ID tipe konten blog (harus aktif)
                  example: 1
                title:
                  type: string
                  maxLength: 255
                  description: Judul artikel
                  example: Artikel Diperbarui
                thumbnail:
                  type: string
                  format: binary
                  description: Gambar thumbnail baru (file upload)
                body:
                  type: string
                  description: Isi konten artikel
                  example: Isi konten artikel yang diperbarui.
                is_published:
                  type: boolean
                  description: Apakah artikel dipublikasi
                published_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: Tanggal publikasi kustom (ISO 8601)
      responses:
        "200":
          description: Artikel berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeArticleDetail"
              example:
                success: true
                message: Artikel berhasil diperbarui.
                data:
                  id: 1
                  content_type:
                    id: 1
                    name: News
                    slug: news
                  title: Artikel Diperbarui
                  slug: artikel-diperbarui
                  body: Isi konten artikel yang diperbarui.
                  view_count: 0
                  thumbnail_url: http://localhost:8000/storage/blog/thumbnails/sample.jpg
                  is_published: true
                  published_at: "2026-03-22T02:08:14Z"
                  created_by: 1
                  created_by_name: System Admin
                  created_at: "2026-03-22T02:08:14Z"
                  updated_at: "2026-03-22T03:00:00Z"
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role admin
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya admin yang dapat mengubah artikel.
                data: null
                errors: null
                meta: null
        "404":
          description: Artikel tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Artikel tidak ditemukan.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  title:
                    - The title must be a string.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
    delete:
      tags: [Blog]
      summary: Hapus artikel blog (admin only)
      description: |
        Menghapus artikel blog berdasarkan slug. Hanya user dengan role `admin` yang dapat mengakses.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Slug unik artikel
          example: artikel-perdana-kompeta
      responses:
        "200":
          description: Artikel berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeEmpty"
              example:
                success: true
                message: Artikel berhasil dihapus.
                data: null
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role admin
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya admin yang dapat menghapus artikel.
                data: null
                errors: null
                meta: null
        "404":
          description: Artikel tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Artikel tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /public/blog/articles/{slug}:
    get:
      tags: [Blog]
      summary: Detail artikel blog (sekaligus tambah view_count)
      description: |
        Menampilkan detail lengkap artikel blog berdasarkan slug.
        Setiap kali endpoint ini dipanggil, `view_count` akan bertambah 1 secara otomatis.
      security: []
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Slug unik artikel (auto-generated dari title)
          example: artikel-perdana-kompeta
      responses:
        "200":
          description: Detail artikel berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeArticleDetail"
              example:
                success: true
                message: Detail artikel berhasil diambil.
                data:
                  id: 1
                  content_type:
                    id: 1
                    name: News
                    slug: news
                  title: Artikel Perdana Kompeta
                  slug: artikel-perdana-kompeta
                  body: Isi konten artikel lengkap.
                  view_count: 121
                  thumbnail_url: http://localhost:8000/storage/blog/thumbnails/sample.jpg
                  is_published: true
                  published_at: "2026-03-22T02:08:14Z"
                  created_by: 1
                  created_by_name: System Admin
                  created_at: "2026-03-22T02:08:14Z"
                  updated_at: "2026-03-22T02:08:14Z"
                errors: null
                meta: null
        "404":
          description: Artikel tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Artikel tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
