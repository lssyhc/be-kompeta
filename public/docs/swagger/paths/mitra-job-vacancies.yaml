                  salary_label: Rp 5,7 jt-5,8 jt
                  requirements: "Minimal Sarjana (S1).\nMemahami MYOB.\nKomunikasi baik."
                  job_description: Mengerjakan proses jurnal, rekonsiliasi, dan laporan keuangan harian perusahaan.
                  is_published: true
