paths:
  /public/mitra:
    get:
      tags: [Mitra]
      summary: List mitra (perusahaan & UMKM)
      description: |
        Menampilkan daftar mitra (perusahaan dan UMKM) sebagai card-card.
        Hanya akun mitra yang sudah disetujui admin (`account_status=active`) yang akan tampil.
        Mendukung pencarian berdasarkan nama dan filter berdasarkan tipe mitra.
        Diurutkan berdasarkan aktivitas login terakhir (`last_login_at` DESC).
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Cari berdasarkan nama mitra — company_name (perusahaan) atau business_name (UMKM). Case-insensitive, partial match.
          example: binajasa
        - in: query
          name: type
          schema:
            type: string
            enum: [perusahaan, umkm]
          description: |
            Filter berdasarkan tipe mitra:
            - perusahaan: Mitra tipe perusahaan (PT, CV, dll)
            - umkm: Mitra tipe UMKM
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman (dimulai dari 1)
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
          description: Jumlah item per halaman (default 12, maks 50)
      responses:
        "200":
          description: Daftar mitra berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeMitraList"
              example:
                success: true
                message: Daftar mitra berhasil diambil.
                data:
                  - id: 2
                    mitra_type: perusahaan
                    name: PT Binajasa Sumber Sarana
                    logo_url: https://via.placeholder.com/200x200?text=Binajasa
                    address: Jakarta Selatan, DKI Jakarta
                    industry_sector: Outsourcing dan layanan tenaga kerja
                    vacancy_count: 2
                    last_active: 5 jam yang lalu
                    featured_vacancy:
                      slug: accounting-staff-1602be
                      position_name: Accounting Staff
                      salary_label: Rp 5,7 jt-5,8 jt
                      job_type_label: Penuh Waktu
                      experience_level_label: Kurang dari Setahun
                      skills: [MYOB, Excel, Akuntansi Dasar]
                  - id: 4
                    mitra_type: umkm
                    name: Roti Bunda Rasa
                    logo_url: https://via.placeholder.com/200x200?text=Roti+Bunda
                    address: Semarang, Jawa Tengah
                    industry_sector: Kuliner
                    vacancy_count: 2
                    last_active: 4 jam yang lalu
                    featured_vacancy:
                      slug: baker-assistant-semarang
                      position_name: Baker Assistant
                      salary_label: Rp 3 jt-3,5 jt
                      job_type_label: Penuh Waktu
                      experience_level_label: Fresh Graduate
                      skills: [Baking, Kebersihan Dapur]
                errors: null
                meta:
                  pagination:
                    current_page: 1
                    last_page: 1
                    per_page: 12
                    total: 4
                    has_more_pages: false
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /public/mitra/{id}:
    get:
      tags: [Mitra]
      summary: Detail mitra
      description: |
        Menampilkan detail lengkap sebuah mitra beserta:
        - Informasi profil (nama, deskripsi, alamat, jumlah karyawan, sosmed, galeri)
        - Daftar semua lowongan aktif (published) dari mitra tersebut
        - Hingga 5 mitra serupa (berdasarkan sektor industri, keaktifan, dan ketersediaan loker)

        Hanya dapat diakses untuk akun mitra yang sudah disetujui admin (`account_status=active`).
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID user mitra
          example: 2
      responses:
        "200":
          description: Detail mitra berhasil diambil
