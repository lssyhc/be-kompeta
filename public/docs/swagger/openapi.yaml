components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  schemas:
    SuccessEnvelopeEmpty:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success.
        data:
          nullable: true
          example: null
        errors:
          nullable: true
          example: null
        meta:
          nullable: true
          example: null

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validasi gagal.
        data:
          nullable: true
          example: null
        errors:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
          example:
            email:
              - The email field is required.
        meta:
          nullable: true
          example: null

    SuccessEnvelopeAuthRegister:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: "#/components/schemas/User"
                role_profile:
                  nullable: true
                  oneOf:
                    - $ref: "#/components/schemas/SchoolProfile"
                    - $ref: "#/components/schemas/CompanyProfile"
                    - $ref: "#/components/schemas/UmkmProfile"

    SuccessEnvelopeAuthLogin:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                token:
                  type: string
                token_type:
                  type: string
                  example: Bearer
                user:
                  $ref: "#/components/schemas/User"
                role_profile:
                  nullable: true
                  oneOf:
                    - $ref: "#/components/schemas/AdminProfile"
                    - $ref: "#/components/schemas/SchoolProfile"
                    - $ref: "#/components/schemas/CompanyProfile"
                    - $ref: "#/components/schemas/UmkmProfile"
                    - $ref: "#/components/schemas/StudentProfile"
                requires_skill_setup:
                  type: boolean
                next_step:
                  nullable: true
                  type: string
                  example: add_skill

    SuccessEnvelopeAuthMe:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: "#/components/schemas/User"
                role_profile:
                  nullable: true
                  oneOf:
                    - $ref: "#/components/schemas/AdminProfile"
                    - $ref: "#/components/schemas/SchoolProfile"
                    - $ref: "#/components/schemas/CompanyProfile"
                    - $ref: "#/components/schemas/UmkmProfile"
                    - $ref: "#/components/schemas/StudentProfile"
                requires_skill_setup:
                  type: boolean
                next_step:
                  nullable: true
                  type: string

    SuccessEnvelopeProfile:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: "#/components/schemas/User"
                role_profile:
                  nullable: true
                  oneOf:
                    - $ref: "#/components/schemas/AdminProfile"
                    - $ref: "#/components/schemas/SchoolProfile"
                    - $ref: "#/components/schemas/CompanyProfile"
                    - $ref: "#/components/schemas/UmkmProfile"
                    - $ref: "#/components/schemas/StudentProfileRoleProfile"

    SuccessEnvelopeSchoolStoreStudent:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  allOf:
                    - $ref: "#/components/schemas/User"
                    - type: object
                      properties:
                        student_profile:
                          $ref: "#/components/schemas/StudentProfile"

    SuccessEnvelopeStudentList:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/StudentProfile"
            meta:
              type: object
              properties:
                pagination:
                  $ref: "#/components/schemas/PaginationMeta"

    SuccessEnvelopeStudentSearch:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: "#/components/schemas/StudentProfile"
            meta:
              type: object
              properties:
                query:
                  type: string
                total:
                  type: integer

    SuccessEnvelopeStudentDetail:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                student:
                  $ref: "#/components/schemas/StudentProfileDetail"

    SuccessEnvelopePortfolioItem:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                item:
                  oneOf:
                    - $ref: "#/components/schemas/StudentSkill"
                    - $ref: "#/components/schemas/StudentExperience"
                    - $ref: "#/components/schemas/StudentAchievement"
                    - $ref: "#/components/schemas/StudentApplication"

    SuccessEnvelopeReminder:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: object
              properties:
                reminder:
                  type: string

    SuccessEnvelopePartnershipProposal:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PartnershipProposal"

    SuccessEnvelopePartnershipProposalList:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PartnershipProposal"
            meta:
              type: object
              properties:
                pagination:
                  $ref: "#/components/schemas/PaginationMeta"

    SuccessEnvelopeStudentJobApplication:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/StudentJobApplication"

    SuccessEnvelopeMitraJobApplication:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/MitraJobApplication"

    SuccessEnvelopeMitraJobApplicationList:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/MitraJobApplication"
            meta:
              type: object
              properties:
                pagination:
                  $ref: "#/components/schemas/PaginationMeta"

    SuccessEnvelopeStudentJobApplicationList:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/StudentJobApplication"
            meta:
              type: object
              properties:
                pagination:
                  $ref: "#/components/schemas/PaginationMeta"

    ContentTypeItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string

    ArticleCard:
      type: object
      properties:
        id:
          type: integer
        content_type:
          $ref: "#/components/schemas/ContentTypeItem"
        title:
          type: string
        slug:
          type: string
        view_count:
          type: integer
        thumbnail_url:
          nullable: true
          type: string
        published_at:
          nullable: true
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    ArticleDetail:
      allOf:
        - $ref: "#/components/schemas/ArticleCard"
        - type: object
          properties:
            body:
              type: string
            is_published:
              type: boolean
            created_by:
              type: integer
            created_by_name:
              type: string
            updated_at:
              type: string
              format: date-time

    SuccessEnvelopeContentTypeList:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ContentTypeItem"

    SuccessEnvelopeArticleList:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ArticleCard"
            meta:
              type: object
              properties:
                pagination:
                  $ref: "#/components/schemas/PaginationMeta"

    SuccessEnvelopeArticleListNoPagination:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ArticleCard"

    SuccessEnvelopeArticleDetail:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ArticleDetail"

    RegistrationItem:
      type: object
      properties:
        id:
          type: integer
        nama:
          type: string
        title:
          type: string
          example: Sekolah
        status:
          type: string
          enum: [pending, active]
        detail:
          type: object
          additionalProperties: true

    SuccessEnvelopeAdminRegistrationList:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/RegistrationItem"
            meta:
              type: object
              properties:
                pagination:
                  $ref: "#/components/schemas/PaginationMeta"

    SuccessEnvelopeAdminRegistrationItem:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelopeEmpty"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/RegistrationItem"

    PaginationMeta:
      type: object
      description: Metadata pagination standar Laravel.
      properties:
        current_page:
          type: integer
          description: Halaman saat ini
          example: 1
        last_page:
          type: integer
          description: Halaman terakhir
          example: 5
        per_page:
          type: integer
          description: Jumlah item per halaman
          example: 12
        total:
          type: integer
          description: Total item di seluruh halaman
          example: 55
        has_more_pages:
          type: boolean
          description: Apakah masih ada halaman berikutnya
          example: true

    User:
      type: object
      description: Objek user dasar yang ada di setiap response autentikasi.
      properties:
        id:
          type: integer
          description: ID unik user
          example: 11
        name:
          type: string
          description: Nama tampilan user
          example: Budi Santoso
        email:
          nullable: true
          type: string
          description: Email user (null untuk siswa)
          example: budi@example.com
        role:
          type: string
          description: |
            Role user:
            - admin: Administrator sistem
            - sekolah: Akun sekolah
            - mitra: Akun mitra (perusahaan/UMKM)
            - siswa: Akun siswa
          enum: [admin, sekolah, mitra, siswa]
          example: siswa
        mitra_type:
          nullable: true
          type: string
          description: Tipe mitra (hanya jika role=mitra)
          enum: [perusahaan, umkm]
          example: null
        account_status:
          type: string
          description: |
            Status akun:
            - pending: Menunggu verifikasi admin
            - active: Akun aktif
            Catatan: Akun yang ditolak akan dihapus dari sistem, sehingga status `rejected` tidak akan muncul dalam data.
          enum: [pending, active]
          example: active
        last_login_at:
          nullable: true
          type: string
          format: date-time

    AdminProfile:
      type: object
