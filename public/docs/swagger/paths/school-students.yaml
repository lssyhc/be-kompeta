paths:
  /school/students:
    get:
      tags: [School Students]
      summary: List siswa milik sekolah login
      description: |
        Menampilkan daftar siswa yang terdaftar di bawah akun sekolah yang sedang login.
        Hanya user dengan role `sekolah` yang dapat mengakses.

        **Filter opsional:**
        - `class_year`: Filter berdasarkan tahun kelas (exact match, 4 digit)
        - `graduation_status`: Filter berdasarkan status kelulusan (exact match)

        Diurutkan berdasarkan `created_at` terbaru. Paginasi default 20 per halaman.
      parameters:
        - in: query
          name: class_year
          schema:
            type: string
          description: "Filter berdasarkan tahun kelas (4 digit, contoh: 2024)"
          example: "2024"
        - in: query
          name: graduation_status
          schema:
            type: string
          description: "Filter berdasarkan status kelulusan (contoh: Belum Lulus, Lulus)"
          example: Lulus
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Nomor halaman (dimulai dari 1)
      responses:
        "200":
          description: Daftar siswa berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeStudentList"
              example:
                success: true
                message: Daftar siswa berhasil diambil.
                data:
                  - id: 1
                    user_id: 11
                    school_user_id: 8
                    full_name: Budi Santoso
                    nisn: "0001234567"
                    major: IPA
                    school_origin: SMA Negeri 1 Bogor
                    graduation_status: graduated
                    class_year: "2024"
                    unique_code: BUDI0001234X9YZ
                errors: null
                meta:
                  pagination:
                    current_page: 1
                    last_page: 1
                    per_page: 20
                    total: 1
                    has_more_pages: false
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya user sekolah yang dapat mengakses data siswa.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

    post:
      tags: [School Students]
      summary: Tambah siswa oleh sekolah
      description: |
        Menambahkan siswa baru ke akun sekolah yang sedang login.
        Otomatis membuat akun `User` dengan role `siswa` dan `StudentProfile` terkait.

        **Proses internal:**
        1. Buat `User` dengan `role=siswa`, `account_status=active`
        2. Buat `StudentProfile` dengan `school_user_id` dari sekolah login
        3. Generate `unique_code` 8 karakter acak untuk login siswa

        **Field wajib:** `full_name`, `nisn`, `major`, `school_origin`, `graduation_status`, `class_year`
        **Field opsional:** `socials`, `address`, `photo_profile` (file gambar)

        Jika `photo_profile` tidak dikirim, sistem akan otomatis menggunakan foto profil default.

        NISN harus unik secara global.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "../openapi.yaml#/components/schemas/StoreStudentRequest"
            example:
              full_name: Budi Santoso
              nisn: "0001234567"
              major: IPA
              school_origin: SMA Negeri 1 Bogor
              graduation_status: graduated
              class_year: "2024"
              socials:
                instagram: https://instagram.com/budisantoso
                whatsapp: "082123456789"
              address: Bogor, Jawa Barat
      responses:
        "201":
          description: Data siswa berhasil ditambahkan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeSchoolStoreStudent"
              example:
                success: true
                message: Data siswa berhasil ditambahkan.
                data:
                  user:
                    id: 11
                    name: Budi Santoso
                    role: siswa
                    account_status: active
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya user sekolah yang dapat menambahkan siswa.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal (NISN duplikat, field wajib kosong, dll.)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  nisn:
                    - The nisn has already been taken.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /school/students/import:
    post:
      tags: [School Students]
      summary: Import batch siswa dari file Excel
      description: |
        Mengimpor data siswa secara batch dari file Excel (.xlsx, .xls) atau CSV (.csv).
        Hanya user dengan role `sekolah` yang dapat mengakses.

        **Format kolom Excel yang diharapkan (baris pertama = header):**
        | Kolom | Wajib | Keterangan |
        |-------|-------|------------|
        | `full_name` | Ya | Nama lengkap siswa |
        | `nisn` | Ya | 10 digit, harus unik |
        | `major` | Ya | Jurusan |
        | `school_origin` | Ya | Asal sekolah |
        | `graduation_status` | Ya | Status kelulusan |
        | `class_year` | Ya | Angkatan (4 digit) |
        | `address` | Tidak | Alamat |

        **Catatan:**
        - Photo profile **tidak termasuk** dalam import, sistem otomatis menggunakan foto profil default
        - Baris yang gagal validasi akan di-skip, baris lainnya tetap diproses
        - Setiap baris valid akan membuat `User` (role siswa) + `StudentProfile`
        - Maksimum ukuran file: 2 MB
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ImportStudentsRequest"
      responses:
        "200":
          description: Import selesai (berisi ringkasan berhasil dan gagal)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeImportStudents"
              example:
                success: true
                message: "Import siswa selesai. 45 berhasil, 3 gagal."
                data:
                  successful_count: 45
                  failed_count: 3
                  failures:
                    - row: 5
                      attribute: nisn
                      errors:
                        - "NISN sudah terdaftar."
                    - row: 12
                      attribute: nisn
                      errors:
                        - "NISN harus 10 digit."
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya user sekolah yang dapat mengimpor data siswa.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal (file tidak dikirim, format file salah, dll.)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  file:
                    - The file field is required.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /school/students/search:
    get:
      tags: [School Students]
      summary: Cari siswa berdasarkan nama atau NISN
      description: |
        Mencari siswa milik sekolah yang sedang login berdasarkan keyword.
        Pencarian dilakukan pada field `full_name` dan `nisn` (case-insensitive, partial match / LIKE).
        Hanya mengembalikan siswa milik sekolah login (`school_user_id`).

        Tidak menggunakan paginasi — mengembalikan semua hasil yang cocok (di-limit oleh `take(50)`).
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
          description: Kata kunci pencarian (nama atau NISN, case-insensitive partial match)
          example: Budi
      responses:
        "200":
          description: Pencarian siswa berhasil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeStudentSearch"
              example:
                success: true
                message: Pencarian siswa berhasil.
                data:
                  results:
                    - id: 1
                      full_name: Budi Santoso
                      nisn: "0001234567"
                errors: null
                meta:
                  query: Budi
                  total: 1
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya user sekolah yang dapat mencari data siswa.
                data: null
                errors: null
                meta: null
        "422":
          description: Parameter pencarian tidak valid
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  q:
                    - The q field is required.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

  /school/students/{id}:
    get:
      tags: [School Students]
      summary: Detail siswa
      description: |
        Menampilkan detail lengkap seorang siswa milik sekolah login.
        Termasuk data profil, skills, experiences, achievements, dan job applications.

        `id` di sini adalah `StudentProfile.id`, bukan `User.id`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID student profile
          example: 1
      responses:
        "200":
          description: Detail siswa berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeStudentDetail"
              example:
                success: true
                message: Detail siswa berhasil diambil.
                data:
                  student:
                    id: 1
                    user_id: 11
                    school_user_id: 8
                    full_name: Budi Santoso
                    nisn: "0001234567"
                    major: IPA
                    school_origin: SMA Negeri 1 Bogor
                    graduation_status: graduated
                    class_year: "2024"
                    unique_code: BUDI0001234X9YZ
                    description: Siswa berprestasi dengan fokus bidang sains dan data.
                    socials:
                      website: null
                      instagram: https://instagram.com/budisantoso
                      linkedin: null
                      whatsapp: "082123456789"
                    address: Bogor, Jawa Barat
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya user sekolah yang dapat mengakses data siswa.
                data: null
                errors: null
                meta: null
        "404":
          description: Data siswa tidak ditemukan (bukan milik sekolah login atau tidak ada)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Data siswa tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

    put:
      tags: [School Students]
      summary: Update data siswa
      description: |
        Memperbarui data profil siswa milik sekolah login.
        Semua field bersifat opsional — hanya field yang dikirim yang akan diperbarui.

        Jika `full_name` diubah, `User.name` juga akan terupdate secara otomatis.
        Field `photo_profile` menerima file gambar (jpg/png, max 2MB).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID student profile
          example: 1
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              $ref: "../openapi.yaml#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Data siswa berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeStudentDetail"
              example:
                success: true
                message: Data siswa berhasil diperbarui.
                data:
                  student:
                    id: 1
                    user_id: 11
                    school_user_id: 8
                    full_name: Budi Santoso
                    nisn: "0001234567"
                    major: IPA
                    school_origin: SMA Negeri 1 Bogor
                    graduation_status: graduated
                    class_year: "2025"
                    unique_code: BUDI0001234X9YZ
                    description: Siswa berprestasi dengan fokus bidang sains dan data.
                    socials:
                      website: null
                      instagram: https://instagram.com/budisantoso
                      linkedin: null
                      whatsapp: "082123456789"
                    address: Jakarta Selatan
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya user sekolah yang dapat mengubah data siswa.
                data: null
                errors: null
                meta: null
        "404":
          description: Data siswa tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Data siswa tidak ditemukan.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal (NISN duplikat, format salah, dll.)
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  nisn:
                    - The nisn has already been taken.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

    delete:
      tags: [School Students]
      summary: Hapus permanen data siswa
      description: |
        Menghapus data siswa secara permanen (hard delete).
        Menghapus `StudentProfile` dan `User` terkait beserta semua access token-nya.

        **⚠️ Operasi ini tidak dapat dibatalkan.**
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID student profile
          example: 1
      responses:
        "200":
          description: Data siswa berhasil dihapus
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeEmpty"
              example:
                success: true
                message: Data siswa berhasil dihapus.
                data: null
                errors: null
                meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "403":
          description: User bukan role sekolah
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
                success: false
                message: Hanya user sekolah yang dapat menghapus data siswa.
                data: null
                errors: null
                meta: null
        "404":
          description: Data siswa tidak ditemukan
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope404"
              example:
                success: false
                message: Data siswa tidak ditemukan.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
