        "401":
          description: Belum login / token tidak valid
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
        "403":
          description: Bukan role mitra
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope403"
              example:
