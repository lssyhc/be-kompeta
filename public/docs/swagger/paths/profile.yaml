paths:
  /profile:
    get:
      tags: [Profile]
      summary: Ambil profile user login lintas role
      description: |
        Endpoint profile universal untuk semua role.
        Field `role_profile` diisi dari tabel profile sesuai role user:
        - **admin** → `admin_profiles` (`full_name`, `avatar_path`, `avatar_url`)
        - **sekolah** → `school_profiles` (`school_name`, `npsn`, `address`, `accreditation`, `expertise_fields`, `short_description`, dll.)
        - **mitra perusahaan** → `company_profiles` (`company_name`, `nib`, `industry_sector`, `employee_total_range`, `office_address`, `short_description`, dll.)
        - **mitra umkm** → `umkm_profiles` (`business_name`, `owner_nik`, `business_type`, `business_address`, `short_description`, dll.)
        - **siswa** → `student_profiles` + `job_applications` (`full_name`, `nisn`, `major`, `school_origin`, `graduation_status`, `class_year`, `description`, `socials`, `address`, dll.)

        Untuk siswa, `role_profile` juga menyertakan `job_applications` — daftar lamaran kerja aktif.
      responses:
        "200":
          description: Profil berhasil diambil
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeProfile"
              examples:
                admin:
                  summary: Response profile admin
                  value:
                    success: true
                    message: Profil berhasil diambil.
                    data:
                      user:
                        id: 1
                        name: System Admin
                        email: admin@kompeta.test
                        role: admin
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T10:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 1
                        full_name: System Admin
                        avatar_path: null
                        avatar_url: null
                    errors: null
                    meta: null
                siswa:
                  summary: Response profile siswa (termasuk job_applications)
                  value:
                    success: true
                    message: Profil berhasil diambil.
                    data:
                      user:
                        id: 11
                        name: Budi Santoso
                        email: student.a1@kompeta.test
                        role: siswa
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T09:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 11
                        full_name: Budi Santoso
                        nisn: "0001234567"
                        major: IPA
                        school_origin: SMA Negeri 1 Bogor
                        graduation_status: graduated
                        class_year: "2024"
                        description: Siswa berprestasi dengan fokus bidang sains dan data.
                        socials:
                          website: null
                          instagram: https://instagram.com/budisantoso
                          linkedin: null
                          whatsapp: "082123456789"
                        address: Bogor, Jawa Barat
                        job_applications:
                          - company_name: PT Binajasa Sumber Sarana
                            role_type: Accounting Staff
                            applied_at: "2026-03-19T09:00:00+07:00"
                            status: submitted
                    errors: null
                    meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"

    put:
      tags: [Profile]
      summary: Update profile user login lintas role
      description: |
        Update profile universal untuk semua role.
        Endpoint menerima `multipart/form-data` untuk mendukung upload file (logo, gambar, dokumen) bersama data teks.

        **Payload:**
        - `user[name]` (opsional): nama tampilan user (admin, mitra perusahaan, mitra umkm, siswa)
        - `user[email]` (opsional): email user (sekolah, mitra perusahaan, mitra umkm)
        - `profile[field]` (opsional): data profile spesifik role
        - File upload di level root (opsional): file gambar/dokumen sesuai role

        **Field `profile` per role:**
        | Role                | Field yang diterima |
        |---------------------|---------------------|
        | admin               | `full_name` |
        | sekolah             | `accreditation`, `address`, `expertise_fields`, `short_description`, `socials` |
        | mitra perusahaan    | `company_name`, `industry_sector`, `employee_total_range`, `office_address`, `socials`, `short_description` |
        | mitra umkm          | `business_name`, `owner_personal_nib`, `business_type`, `business_address`, `socials`, `short_description` |
        | siswa               | `full_name`, `description`, `socials`, `address` |

        **Field `user` per role:**
        | Role                | Field yang diterima |
        |---------------------|---------------------|
        | admin               | `name` |
        | sekolah             | `email` |
        | mitra perusahaan    | `name`, `email` |
        | mitra umkm          | `name`, `email` |
        | siswa               | `name` |

        **File upload per role:**
        | Role                | Field file | Tipe | Max size |
        |---------------------|-----------|------|----------|
        | admin               | `avatar` | image (jpg/jpeg/png/webp) | 2 MB |
        | sekolah             | `logo` | image | 2 MB |
        | sekolah             | `image_1`–`image_5` | image | 2 MB |
        | sekolah             | `operational_license` | pdf | 5 MB |
        | mitra perusahaan    | `company_logo` | image | 2 MB |
        | mitra perusahaan    | `image_1`–`image_5` | image | 2 MB |
        | mitra perusahaan    | `kemenkumham_decree` | pdf | 5 MB |
        | mitra umkm          | `umkm_logo` | image | 2 MB |
        | mitra umkm          | `owner_ktp_photo` | image | 2 MB |
        | mitra umkm          | `image_1`–`image_5` | image | 2 MB |
        | siswa               | `photo_profile` | image | 2 MB |

        **Sinkronisasi nama otomatis:**
        Untuk role admin, siswa, mitra perusahaan, dan mitra umkm, field `user.name` dan nama di profile
        (`full_name` / `company_name` / `business_name`) saling sinkron otomatis.
        - Jika hanya `user.name` dikirim → nama profile otomatis diperbarui.
        - Jika hanya nama profile dikirim → `user.name` otomatis diperbarui.
        - Jika keduanya dikirim dengan nilai berbeda → nama profile yang digunakan, `user.name` mengikuti.
        - Sekolah dikecualikan (tidak dapat mengubah nama).

        File lama otomatis dihapus saat file baru diupload.
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                "user[name]":
                  type: string
                  maxLength: 255
                  description: "Nama tampilan user (admin, mitra perusahaan, mitra umkm, siswa)"
                "user[email]":
                  type: string
                  format: email
                  maxLength: 255
                  description: "Email user (sekolah, mitra perusahaan, mitra umkm)"
                "profile[full_name]":
                  type: string
                  maxLength: 255
                  description: "[Admin/Siswa] Nama lengkap"
                "profile[company_name]":
                  type: string
                  maxLength: 255
                  description: "[Perusahaan] Nama perusahaan"
                "profile[business_name]":
                  type: string
                  maxLength: 255
                  description: "[UMKM] Nama usaha"
                "profile[description]":
                  type: string
                  maxLength: 2000
                  description: "[Siswa] Deskripsi diri"
                "profile[address]":
                  type: string
                  description: "[Siswa/Sekolah] Alamat"
                "profile[accreditation]":
                  type: string
                  enum: [A, B, C, Belum Terakreditasi]
                  description: "[Sekolah] Akreditasi"
                "profile[expertise_fields][]":
                  type: array
                  items:
                    type: string
                  description: "[Sekolah] Bidang keahlian"
                "profile[short_description]":
                  type: string
                  maxLength: 1000
                  description: "[Sekolah/Perusahaan/UMKM] Deskripsi singkat"
                "profile[industry_sector]":
                  type: string
                  maxLength: 100
                  description: "[Perusahaan] Sektor industri"
                "profile[employee_total_range]":
                  type: string
                  maxLength: 50
                  description: "[Perusahaan] Range jumlah karyawan"
                "profile[office_address]":
                  type: string
                  description: "[Perusahaan] Alamat kantor"
                "profile[socials][website]":
                  type: string
                  format: uri
                  nullable: true
                  description: "[Sekolah/Perusahaan/UMKM/Siswa] Website URL"
                "profile[socials][instagram]":
                  type: string
                  format: uri
                  nullable: true
                  description: "[Sekolah/Perusahaan/UMKM/Siswa] Instagram URL"
                "profile[socials][linkedin]":
                  type: string
                  format: uri
                  nullable: true
                  description: "[Sekolah/Perusahaan/UMKM/Siswa] LinkedIn URL"
                "profile[socials][whatsapp]":
                  type: string
                  nullable: true
                  description: "[Sekolah/Perusahaan/UMKM/Siswa] WhatsApp number"
                "profile[owner_personal_nib]":
                  type: string
                  maxLength: 50
                  description: "[UMKM] NIB pemilik"
                "profile[business_type]":
                  type: string
                  maxLength: 100
                  description: "[UMKM] Jenis usaha"
                "profile[business_address]":
                  type: string
                  description: "[UMKM] Alamat usaha"
                avatar:
                  type: string
                  format: binary
                  description: "[Admin] Avatar (jpg/jpeg/png/webp, max 2MB)"
                photo_profile:
                  type: string
                  format: binary
                  description: "[Siswa] Foto profil (jpg/jpeg/png/webp, max 2MB)"
                logo:
                  type: string
                  format: binary
                  description: "[Sekolah] Logo (jpg/jpeg/png/webp, max 2MB)"
                operational_license:
                  type: string
                  format: binary
                  description: "[Sekolah] Izin operasional (pdf, max 5MB)"
                company_logo:
                  type: string
                  format: binary
                  description: "[Perusahaan] Logo perusahaan (jpg/jpeg/png/webp, max 2MB)"
                kemenkumham_decree:
                  type: string
                  format: binary
                  description: "[Perusahaan] SK Kemenkumham (pdf, max 5MB)"
                umkm_logo:
                  type: string
                  format: binary
                  description: "[UMKM] Logo UMKM (jpg/jpeg/png/webp, max 2MB)"
                owner_ktp_photo:
                  type: string
                  format: binary
                  description: "[UMKM] Foto KTP pemilik (jpg/jpeg/png/webp, max 2MB)"
                image_1:
                  type: string
                  format: binary
                  description: "[Sekolah/Perusahaan/UMKM] Gambar 1 (jpg/jpeg/png/webp, max 2MB)"
                image_2:
                  type: string
                  format: binary
                  description: "[Sekolah/Perusahaan/UMKM] Gambar 2"
                image_3:
                  type: string
                  format: binary
                  description: "[Sekolah/Perusahaan/UMKM] Gambar 3"
                image_4:
                  type: string
                  format: binary
                  description: "[Sekolah/Perusahaan/UMKM] Gambar 4"
                image_5:
                  type: string
                  format: binary
                  description: "[Sekolah/Perusahaan/UMKM] Gambar 5"
            examples:
              admin:
                summary: Update profile admin
                value:
                  "user[name]": Admin Kompeta
                  "profile[full_name]": Admin Kompeta
              sekolah:
                summary: Update profile sekolah
                value:
                  "user[email]": school.a@kompeta.test
                  "profile[short_description]": Sekolah vokasi unggulan.
                  "profile[address]": Jl. Pendidikan No. 1
                  "profile[accreditation]": A
                  "profile[expertise_fields][]":
                    - RPL
                    - TKJ
                  "profile[socials][website]": https://smknegeri1.sch.id
                  "profile[socials][instagram]": https://instagram.com/smknegeri1
              mitra_perusahaan:
                summary: Update profile mitra perusahaan
                value:
                  "user[name]": PT Binajasa Sumber Sarana
                  "user[email]": mitra.company.a@kompeta.test
                  "profile[company_name]": PT Binajasa Sumber Sarana
                  "profile[short_description]": Perusahaan software enterprise.
                  "profile[office_address]": Jl. Sudirman No. 10
                  "profile[socials][website]": https://example.com
                  "profile[socials][instagram]": https://instagram.com/company
                  "profile[socials][linkedin]": https://linkedin.com/company/example
                  "profile[socials][whatsapp]": "6281234567890"
                  "profile[industry_sector]": Teknologi Informasi
                  "profile[employee_total_range]": 51-200
              mitra_umkm:
                summary: Update profile mitra UMKM
                value:
                  "user[name]": Roti Bunda Rasa
                  "user[email]": mitra.umkm.a@kompeta.test
                  "profile[business_name]": Roti Bunda Rasa
                  "profile[short_description]": UMKM kuliner lokal yang berkembang.
                  "profile[business_address]": Jl. Pasar No. 5
                  "profile[business_type]": Kuliner
                  "profile[owner_personal_nib]": "9876543210"
                  "profile[socials][instagram]": https://instagram.com/umkm
                  "profile[socials][whatsapp]": "6281234567890"
              siswa:
                summary: Update profile siswa
                value:
                  "user[name]": Budi Santoso
                  "profile[full_name]": Budi Santoso
                  "profile[description]": Siswa RPL fokus backend Laravel.
                  "profile[socials][instagram]": https://instagram.com/budisantoso
                  "profile[socials][whatsapp]": "081234567890"
                  "profile[address]": Jakarta Selatan
      responses:
        "200":
          description: Profil berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/SuccessEnvelopeProfile"
              examples:
                admin:
                  summary: Response update profile admin
                  value:
                    success: true
                    message: Profil berhasil diperbarui.
                    data:
                      user:
                        id: 1
                        name: Admin Kompeta
                        email: admin@kompeta.test
                        role: admin
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T10:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 1
                        full_name: Admin Kompeta
                        avatar_path: null
                        avatar_url: null
                    errors: null
                    meta: null
                siswa:
                  summary: Response update profile siswa
                  value:
                    success: true
                    message: Profil berhasil diperbarui.
                    data:
                      user:
                        id: 11
                        name: Budi Santoso
                        email: student.a1@kompeta.test
                        role: siswa
                        mitra_type: null
                        account_status: active
                        last_login_at: "2026-06-01T09:00:00.000000Z"
                      role_profile:
                        id: 1
                        user_id: 11
                        full_name: Budi Santoso
                        nisn: "0001234567"
                        major: IPA
                        school_origin: SMA Negeri 1 Bogor
                        graduation_status: graduated
                        class_year: "2024"
                        description: Siswa berprestasi dengan fokus bidang sains dan data.
                        socials:
                          website: null
                          instagram: https://instagram.com/budisantoso
                          linkedin: null
                          whatsapp: "082123456789"
                        address: Bogor, Jawa Barat
                        job_applications:
                          - company_name: PT Binajasa Sumber Sarana
                            role_type: Accounting Staff
                            applied_at: "2026-03-19T09:00:00+07:00"
                            status: submitted
                    errors: null
                    meta: null
        "401":
          description: Token tidak valid atau sudah expired
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope401"
              example:
                success: false
                message: Unauthenticated.
                data: null
                errors: null
                meta: null
        "422":
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope422"
              example:
                success: false
                message: Validasi gagal.
                data: null
                errors:
                  profile.full_name:
                    - The profile.full name field must be a string.
                meta: null
        "500":
          description: Kesalahan server internal
          content:
            application/json:
              schema:
                $ref: "../openapi.yaml#/components/schemas/ErrorEnvelope500"
