openapi: 3.0.3
info:
  title: BE Kompeta API
  version: 1.0.0
  description: |
    Dokumentasi API BE Kompeta.
    Semua response JSON API mengikuti envelope standar:
    - success: boolean
    - message: string
    - data: object|null
    - errors: object|null
    - meta: object|null

    Akun seeded untuk frontend (password default: password123, kecuali admin):
    - Admin: admin@kompeta.test (password: admin12345)
    - Sekolah aktif: school.a@kompeta.test, school.b@kompeta.test
    - Mitra perusahaan aktif: mitra.company.a@kompeta.test, mitra.company.b@kompeta.test
    - Mitra UMKM aktif: mitra.umkm.a@kompeta.test, mitra.umkm.b@kompeta.test
    - Siswa aktif (login pakai role siswa):
      - NISN 0001234567, school_origin SMA Negeri 1 Bogor, unique_code BUDI0001234X9YZ
      - NISN 0001234568, school_origin SMA Negeri 1 Bogor, unique_code SITI0001234X9YZ
      - NISN 0002345678, school_origin SMA Negeri 2 Jakarta, unique_code qzPSGd04erQblY8G

    Akun seeded untuk skenario approval admin:
    - Pending sekolah: school.pending@kompeta.test
    - Pending mitra: mitra.pending@kompeta.test

    Dataset dummy tambahan (Seeder terbaru):
    - 10 sekolah tambahan aktif:
      - Email pattern: school.bulk.01@kompeta.test sampai school.bulk.10@kompeta.test
    - 10 mitra tambahan aktif (5 perusahaan + 5 UMKM):
      - Perusahaan email pattern: mitra.bulk.company.01@kompeta.test sampai mitra.bulk.company.05@kompeta.test
      - UMKM email pattern: mitra.bulk.umkm.01@kompeta.test sampai mitra.bulk.umkm.05@kompeta.test
    - 1 sekolah dengan data siswa skala besar:
      - Akun sekolah: school.massive@kompeta.test
      - Total siswa terkait: 200
      - Komposisi graduation_status: 100 graduated, 100 active
      - Email siswa pattern: student.massive.001@kompeta.test sampai student.massive.200@kompeta.test
